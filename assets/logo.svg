    <tspan fill="#1A1A1A" font-weight="bold" stroke="#6CBE45" stroke-width="1.5">D</tspan><tspan fill="#9B9B9B">arrens </tspan><tspan fill="#1A1A1A" font-weight="bold" stroke="#6CBE45" stroke-width="1.5">G</tspan><tspan fill="#9B9B9B">arage </tspan><tspan fill="#1A1A1A" font-weight="bold" stroke="#6CBE45" stroke-width="1.5">S</tspan><tspan fill="#9B9B9B">ervices</tspan>
